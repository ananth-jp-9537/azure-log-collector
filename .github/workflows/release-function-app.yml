name: Release Function App

on:
  push:
    paths:
      - 'function-app/VERSION'
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if VERSION unchanged'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat function-app/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build function app zip
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          cd function-app
          zip -r ../s247-function-app.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x ".venv/*" \
            -x ".pytest_cache/*" \
            -x "tests/*" \
            -x "local.settings.json" \
            -x "requirements-dev.txt"
          cd ..
          echo "Zip size: $(du -h s247-function-app.zip | cut -f1)"
          echo "Contents:"
          unzip -l s247-function-app.zip | tail -5

      - name: Generate version.json
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "package_url": "https://github.com/${REPO}/releases/download/${TAG}/s247-function-app.zip",
            "release_notes": "Auto-release of function app version ${VERSION}"
          }
          EOF
          cat version.json

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Delete existing release if force
          if [ "${{ github.event.inputs.force_release }}" = "true" ]; then
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          gh release create "$TAG" \
            --title "Function App $VERSION" \
            --notes "Auto-release of Site24x7 Diagnostic Logs Function App version $VERSION" \
            --target "${{ github.sha }}" \
            s247-function-app.zip \
            version.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Zip:** s247-function-app.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "- **version.json URL:** https://github.com/${{ github.repository }}/releases/latest/download/version.json" >> "$GITHUB_STEP_SUMMARY"
